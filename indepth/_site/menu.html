<!DOCTYPE html>
<html lang="en">
<head>
	<style>
		
		body { width: 75%; margin: 0 auto; }
		*, ::before, ::after { box-sizing: border-box; }

		/* 1. position container */
		.nav-menu { position: relative; }		
		
		.button-menu {
			/* deactivate user-agent styling */
			border: 0;
			background-color: transparent; 
			/* position button relative to container ".menu" */
			/* when removed from normal document flow toggle function is deactivated */
			position: absolute; 
			top: 0.2em;
			right: 0.1em; 
			font-size: 3em; 
			width: 1em;
			height: 1em;
			line-height: 0.4em;
			text-indent: 5em;
			white-space: nowrap; 
			overflow: hidden; }
		.button-menu::after {
			position: absolute;
			top: 0.2em;
			left: 0.2em;
			display: block;
			content: "\2261";
			text-indent: 0; }
		/* 2. Initially hide dropdown */
		/* 3. Position dropdown below toggle button */		
		.dropdown-container {
			display: none;
			position: absolute;
			top: 3em; 
			right: 0;
			left: 0;
			margin: 0; } 	
		/* 4. Display dropdown when toggle is activated 
		.is-open is accessed via javascript */
		.nav-menu.is-open .dropdown-container { display: block; }		

		.menu {
			margin: 0;
			padding-inline-start: 0;
			border: 1px solid #ccc;
			list-style-type: none;
			background-color: #000;
			color: #fff; }
		.menu > li + li {
			border-block-start: 1px solid #ccc; }
		.menu > li > a {
			display: block;
			padding-inline: 1em;
			padding-block: 0.8em;
			color: #fff;
			font-weight: normal; }
		</style>	


		

</head>
<body>
	<!-- set container for menu and navigation -->
	<nav class="nav-menu" id="menu">
		<!-- toggle for activating dropdown -->
		<!-- class for styling, id for javascript -->
		<button type="button" class="button-menu" id="menu-button">button</button>
		<!-- div container for accessing subsequent ul list items. essentially serves same function
		as ul class -->
		<div class="dropdown-container">
			<ul class="menu">
				<li><a href="#">first menu item</a></li>
				<li><a href="#">menu item</a></li>
				<li><a href="#">menu item</a></li>
				<li><a href="#">menu item</a></li>
				<li><a href="#">last menu item</a></li>																
			</ul>
		</div>
	</nav>

		<script type="module">
		const menu = document.getElementById('menu');			
		const button = document.getElementById('menu-button');
		button.addEventListener('click', function (event) {
			event.preventDefault();
			menu.classList.toggle('is-open'); });
	</script>
</body>
</html>
