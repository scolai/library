<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing heros | Sign-in form</title>
  <link rel="stylesheet" media="screen" href="style.css">
<style>
</style>
</head>
<body>
	<div class="sign-in-form">
		<div class="wrapper">
			<div class="hero-wrapper">
				<div class="body">
					<header class="hero-header">
						<h2 class="title">I'm baby sustainable whatever neutra flexitarian freegan. Chambray meggings trust fund, selvage</h2>
						<p class="subtitle">We are a small design and branding firm with deep experience.</p> 
						<p class="subtitle">We’d love to help you develop your authentic brand.</p>
					</header>
				</div>
				<form class="form">
					<div class="form-body">
						<div class="field-wrapper">
							<div class="input-wrapper">
								<label class="input-label" for="name">Name (4 to 10 characters)</label>
								<input type="text" id="name" name="name" required minlength="4" />
							</div>
							<div class="input-wrapper">
								<label class="input-label" for="email">Email address</label>
								<input type="text" id="email" name="email" required minlength="4" />			
							</div>
						</div>
						<div class="checkbox-wrapper">
							<input type="checkbox" id="subscribe" name="subscribe" value="newsletter" />
							<label class="checkbox-label" for="subscribe">Newsletter Signup</label>
						</div>
						<div class="button-wrapper">
							<button class="button" type="button">Submit this !</button>
						</div>
					</div>
					<div class="form-footer">
						<p>I'm baby godard synth keffiyeh narwhal gastropub.</p>
					</div>
				</form>				
			</div>
		</div>
	</div>
</body>
</html>
