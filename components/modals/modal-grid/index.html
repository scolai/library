<!DOCTYPE html>
<html lang="en" target="_blank">
<head>
  <meta charset="UTF-8" target="_blank">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" target="_blank">
  <title>Component Library</title>
  <link rel="stylesheet" media="screen" href="/assets/css/styles.css" target="_blank">
  <!-- <script src="/assets/js/modal.js"></script> -->
  </head>
  <body>
    <div class="modal-grid">
    	<div class="mdl-dark-shim-bg">

		<header class="top-banner">
			<div class="top-banner-inner">
				<p>Find out what's going on at Wombat Coffee each month. Sign up for our newsletter:
					<button id="open" type="button">Sign up</button>
				</p>
			</div>
		</header>
		<div class="modal" id="modal" role="dialog" aria-modal="true">
			<div class="backdrop"></div>
			<div class="body">
				<button class="modal-close" id="close" type="button">close</button>
                <div class="container">
                    <div class="portfolio">
                        <figure class="featured">
                            <img src="/assets/images/donkey.jpg" alt="Donkey" />
                            <figcaption>Donkey</figcaption>
                        </figure>
                        <figure>
                            <img src="/assets/images/horse.jpg" alt="Horse" />
                            <figcaption>Horse</figcaption>
                        </figure>
                        <figure class="featured">
                            <img src="/assets/images/bear.jpg" alt="Bear" />
                            <figcaption>Bear</figcaption>
                        </figure>
                        <figure>
                            <img src="/assets/images/whale.jpg" alt="Whale" />
                            <figcaption>Whale</figcaption>
                        </figure>
                        <figure class="featured">
                            <img src="/assets/images/dolphin.jpg" alt="Dolphin" />
                            <figcaption>Dolphin</figcaption>
                        </figure>
                        <figure>
                            <img src="/assets/images/dog.jpg" alt="Dog" />
                            <figcaption>Dog</figcaption>
                        </figure>
                        <figure>
                            <img src="/assets/images/monkey.jpg" alt="Monkey" />
                            <figcaption>Monkey</figcaption>
                        </figure>                        
                    </div>    
                </div>
			</div> <!-- /.modal-body -->
		</div> <!-- /.modal -->
    </div>
		<main class="container">
			<div class="col-main">
				<nav>
					<div class="dropdown" id="dropdown">
						<button type="button" class="dropdown-toggle" id="dropdown-toggle">Main Menu</button>
						<div class="dropdown-menu">
							<ul class="submenu">
								<li><a href="/">Home</a></li>
								<li><a href="/coffees">Coffees</a></li>
								<li><a href="/brewers">Brewers</a></li>
								<li><a href="/specials">Specials</a></li>
								<li><a href="/about">About us</a></li>
							</ul>
						</div>
					</div>
				</nav>
				<h1>Wombat Coffee Roasters</h1>
			</div>

			<aside class="col-sidebar">
				<div class="affix">
					<ul class="submenu">
						<li><a href="/">Home</a></li>
						<li><a href="/coffees">Coffees</a></li>
						<li><a href="/brewers">Brewers</a></li>
						<li><a href="/specials">Specials</a></li>
						<li><a href="/about-us">About us</a></li>
					</ul>
				</div>
			</aside>
		</main>
	</div>

	<script type="text/javascript">
		const button = document.getElementById('open');
		const close = document.getElementById('close');
		const modal = document.getElementById('modal');

			button.addEventListener('click', function(event) {
				modal.classList.add('is-open');
				document.body.classList.add("no-scroll");
			});

		close.addEventListener('click', function (event) {
			modal.classList.remove('is-open');
			document.body.classList.remove("no-scroll");
		});

		const dropdownToggle = document.getElementById("dropdown-toggle");
		const dropdown = document.getElementById("dropdown");

		dropdownToggle.addEventListener("click", function (event) {
			dropdown.classList.toggle("is-open");
		});
	</script>    
  </body>
  </html>
