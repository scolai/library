{% assign base = include.base %}
{% assign alt = include.alt %}
{% assign caption = include.caption %}
{% assign widths = include.widths | default: "200,400,500,600,800,1280" %}

<picture>
	<!-- AVIF -->
	<source
		type="image/avif"
		srcset="
			{% for w in widths | split: ',' %}
				/assets/images/{{ base }}-{{ w }}.avif {{ w }}w{% unless forloop.last %},{% endunless %}
			{% endfor %}
		"
		sizes="(max-width: 200px) 100vw,
				(max-width: 400px) 200w,
				(max-width: 600px) 500w,
				(max-width: 800px) 600w,
				800px">
				
		<!-- WebP -->
		<source
			type="image/webp"
			srcset="
				{% for w in widths | split: ',' %}
					/assets/images/{{ base }}-{{ w }}.webp {{ w }}w{% unless forloop.last %},{% endunless %}
				{% endfor %}
			"
			sizes="(max-width: 200px) 100vw,
					(max-width: 400px) 200px,
					(max-width: 600px) 500px,
					(max-width: 800px) 600px,
					800px">
					
		<!-- Fallback JPEG -->
		<img
			alt="{{ alt }}"
			src="/assets/images/{{ base }}-400.jpg"
			srcset="
				{% for w in widths | split: ',' %}
					/assets/images/{{ base }}-{{ w }}.jpg {{ w }}w{% unless forloop.last %},{% endunless %}
				{% endfor %}
			"
			sizes="(max-width: 200px) 100vw,
					(max-width: 400px) 200px,
					(max-width: 600px) 500px,
					(max-width: 800px) 600px,
					800px">
</picture>
