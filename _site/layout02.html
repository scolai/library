<!DOCTYPE html>
<html lang="en">
<head>
<style>
	html { background-color: hsl(0, 7%, 94%); }
	* { background-color: hsl(0, 2%, 81%); }
	body { width: 85%; max-width: 1200px; margin: 20px auto; font-family: Arial, sans-serif; font-size: 400%; color: hsl(0, 7%, 22%); letter-spacing: -5px; }
	
	#top, header, #intro, main, h2, footer { padding: 0 20px; border-bottom: 20px solid hsl(0, 7%, 94%); } 
	
	nav { margin-right: 100px; }
	
	#top { height: 10vh; border-bottom: 20px solid hsl(0, 7%, 94%); }
	nav { height: 8vh; float: right; }
	header { clear: right; height: 18vh; border-bottom: 20px solid hsl(0, 7%, 94%); }
	h2 { font-size: 1em; }
	#intro { height: 12vh; }
	main { border-bottom: 20px solid hsl(0, 7%, 94%); padding: 0; }
	main div { display: flex; flex-flow: row; justify-content: space-between; align-items: center; } 
	main section { width: 33%; } 
	img { max-width: 350px; height: 60vh; }
	footer { height: 15vh; }
</style>
</head>
<body>
	<div id="top">
		<img src="#" alt="Logo">
		<nav>Navigation</nav>	
	</div>
	<header>Header / Banner</header>
	<section id="intro">Intro Text Area</section>
	<main>
		<div>
			<section><img src="img/fig-13.png"></section>
			<section><img src="img/fig-13.png"></section>
			<section><img src="img/fig-13.png"></section>	</div>
	</main>
	<footer>Footer</footer>

</body>
</html>
