<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="ch9.css">
</head>
<body>
	<div class="message">
		Save successful
	</div>
	<div class="message message--error">
		Invalid password
	</div>
	<button class="button button--large">Read more</button>
	<button class="button button--success">Save</button>
	<button class="button button--danger button--small">Cancel</button>
	
	<div class="media">
	<!-- image subelement to media module -->
		<img class="media__image" src="runner.png" alt="Silhouette of a person running">
	<!-- body subelement -->
		<div class="media__body">
	<!-- title subelement -->
			<h4>Strength</h4>
			<p>Strength training is an important part of injury prevention. Focus on your core&mdash; especially you abs and glutes.</p>
		</div>
	</div>
	
	<!-- dropdown menu demonstration of multiple modules -->
	<div class="dropdown">
		<button class="dropdown__toggle">Main Menu</button>
		<div class="dropdown__drawer">
			<ul class="menu">
				<li><a href="/">Home</a></li>
				<li><a href="/coffees">Coffees</a></li>
				<li><a href="/brewers">Brewers</a></li>
				<li><a href="/specials">Specials</a></li>
				<li><a href="/about">About</a></li>																
			</ul>
		</div>
	</div>
	
	<script type="module">
		var toggle = document.querySelector('.dropdown__toggle');
		toggle.addEventListener('click', function(event) {
			event.preventDefault();
			var dropdown = event.target.parentNode;
			dropdown.classList.toggle('is-open'); });
	</script>
</body>
</html>
