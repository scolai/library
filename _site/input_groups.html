<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Component Gallery - Input Groups</title>
<link rel="stylesheet" media="screen" href="library.css">
<style>
	*,
	::before,
	::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
        font-family: sans-serif; 
        width: 80vw;
        margin-inline: auto; }
    h1 {
        font-size: var(--title);
        margin: 50px 0; }
    h2 {
        position: absolute;
        font-size: var(--caption);
        left: 0;
        bottom: -20px;   }
        
        
				
		
    flex-row {
		display: flex;
		flex-direction: row;
		justify-content: flex-start;
		margin: 25px auto; }
    flex-item {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        height: 200px;
        margin: 15px 10px 30px;
        flex-basis: 50%;
        background: var(--n-900);
        border: 3px solid #CBD2D9; }
        
        
        
        
    .input-group {
		display: flex;
		align-items: center;
		position: relative;
		width: 350px;
		max-width: 400px; }
    .input-group label {
		position: absolute;
		top: -20px;
		left: 5px;
		font-size: var(--label); }
    .input-group input[type="text"] {
		height: 44px;
		width: 100%;
		padding-inline: 1.25rem;
		padding-block: 0.75rem; 
		outline: none; }
    .input-group input[type="button"] {
		display: flex;
		justify-content: center;
		align-items: center;
		height: 44px;
		padding-inline: 1.25rem;
		padding-block: 0.75rem; 
		font-family: Arial;
		font-weight: 600;
		color: #fff;
		letter-spacing: 0.75px;
		border: 2px solid var(--n-400);
		cursor: pointer; }
		
	button {
		display: flex;
		justify-content: center;
		align-items: center;
		height: 44px;		}
		
																		/* shades */
	.n-400 { background-color: var(--n-400); }
	.f-n-400 { color: var(--n-400) !important; }
	.f-white { color: #fff; }
	.n-900 { background-color: var(--n-900); }
	.white { background-color: #fff !important; }
	
	
																		/* fonts */
	.
	
																		/* labels */
	.label-inset {
		position: absolute !important;
		top: 15px !important; left: 5px !important;
		font-size: var(--body) !important;  }
																		/* text fields */
																		
																		
																		

																		/* buttons */
    .button-detached { margin-left: 10px;}       
    .button-offset { position: absolute; right: -10px; height: 55px !important; padding-inline: 1.5rem !important; }
    .button-inset { position: absolute; top: 4px; right: 4px; height: 36px !important; line-height: 8px; }
    .button-icon { width: 50px !important; padding-block: 5px !important; padding-inline: 5px !important; }
    .button-icon::before { content="\2192" !important; font-family: sans-serif; font-size: 14px; font-weight: 500; }
    
		
    
																		/* radius */
    .radius-xsm { border-radius: 3px; }																				
    .radius-sm { border-radius: var(--size-4); }
    .radius-left-sm { border-radius: var(--size-4) 0 0 var(--size-4); }
	.radius-right-sm { border-radius: 0 var(--size-4) var(--size-4) 0; }
	.radius-md { border-radius: 8px; }
    .radius-lg { border-radius: 10px;}
    .radius-full { border-radius: 50px;}
	.radius-right-full { border-radius: 0 50px 50px 0; }																		
    .radius-none { border-radius: 0; }
    .radius-left-none { border-top-left-radius: 0; border-bottom-left-radius: 0; }
    .radius-right-none { border-top-right-radius: 0; border-bottom-right-radius: 0; }


																		/* borders */
	.border-left-none { border-left: none !important; }    
    .border-right-none { border-right: none !important; }
    .border-top-none { border-top: none !important; }
    .border-bottom-none { border-bottom: none !important; }

</style>
</head>

<body>
    <h1>Input Groups</h1>
    
    <flex-row>          <!-- new row -->
        <flex-item>  <!-- flex item start  -->
            <form class="input-group">        
                  <label>Label</label>
                  <input type="text" class="radius-left-sm radius-right-none border-right-none">
                  <input type="button" class="radius-right-sm radius-left-none n-400" value="Sign Up">
            </form>
                <h2>Small rounded / Attached</h2>
        </flex-item>  <!-- flex item end  -->


        <flex-item>
            <form class="input-group">
                
                    <label>Label</label>
                    <input type="text"class="radius-sm">
                    <input type="button" class="radius-sm button-detached n-400" value="Sign Up">
                
            </form>
            <h2>Small rounded / Detached</h2>
        </flex-item> 
    </flex-row>          <!-- end of row -->
    
    
    
    <flex-row>          <!-- new row -->
        <flex-item>  <!-- flex item start  -->
            <form class="input-group">
				<label>Label</label>
				<input type="text"class="radius-lg">
				<input type="button" class="radius-md button-inset n-400" value="Sign Up">
            </form>
                <h2>Large rounded / Inset button</h2>
        </flex-item>  <!-- flex item end  -->


        <flex-item>
            <form class="input-group">
                
                    <label class="label-inset border-left-none border-right-none">Label</label>
                    <input type="text"class="n-900 radius-none border-left-none border-top-none border-right-none">
                    <input type="button" class="radius-none radius-sm n-400" value="Sign Up">
                
            </form>
            <h2>Bottom border only connected to button</h2>
        </flex-item> 
    </flex-row>          <!-- end of row -->
    
    
    
    <flex-row>          <!-- new row -->
        <flex-item>  <!-- flex item start  -->
            <form class="input-group">
                
                    <label>Label</label>
                    <input type="text"class="radius-sm">                 
                    <input type="button" class="button-inset f-n-400 white border-top-none border-bottom-none border-right-none" value="Sign Up">
                
            </form>
                <h2>With gapped border</h2>
        </flex-item>  <!-- flex item end  -->


        <flex-item>
            <form class="input-group">
                
                    <label>Label</label>
                    <input type="text"class="radius-full border-right-none radius-right-none">                 
                    <input type="button" class="radius-full radius-left-none border-left-none n-400" value="Sign Up">
                
            </form>
            <h2>Full rounded</h2>
        </flex-item> 
    </flex-row>          <!-- end of row -->
    
    
    
    
    <flex-row>          <!-- new row -->
        <flex-item>  <!-- flex item start  -->
            <form class="input-group">
                
                    <label>Label</label>
                    <input type="text"class="radius-full">                 
                    <input type="button" class="radius-full button-offset n-400" value="Sign Up">
                    
            </form>
                <h2>Full rounded with offset button</h2>
        </flex-item>  <!-- flex item end  -->


        <flex-item>
            <form class="input-group">
                
                    <label>Label</label>
                    <input type="text"class="radius-sm radius-right-none">                 
                    <button class="button-icon radius-sm border-left-none radius-left-none n-400 f-white"></button>
                
            </form>
            <h2>With just an icon</h2>
        </flex-item> 
    </flex-row>          <!-- end of row -->
</body>
</html>
