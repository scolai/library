<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamburger Menu</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom font for a clean look */
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Base styles for the hamburger icon lines */
        .hamburger-line {
            display: block;
            width: 24px;
            height: 3px;
            background-color: #333; /* Dark gray for visibility */
            border-radius: 9999px; /* Fully rounded ends */
            transition: all 0.3s ease-in-out; /* Smooth transition for transformation */
        }

        /* Space between the lines */
        .hamburger-line + .hamburger-line {
            margin-top: 4px; /* Space between lines */
        }

        /* --- Active state for hamburger lines (transforms into 'X') --- */
        /* Top line: rotates and moves down */
        .hamburger.active .hamburger-line:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        /* Middle line: fades out */
        .hamburger.active .hamburger-line:nth-child(2) {
            opacity: 0;
        }

        /* Bottom line: rotates and moves up */
        .hamburger.active .hamburger-line:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        /* Hide scrollbar for the body if needed, useful for mobile menus */
        body.no-scroll {
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-lg p-4 md:flex md:items-center md:justify-between relative">
        <!-- Logo or Brand Name -->
        <div class="flex items-center justify-between">
            <a href="#" class="text-2xl font-bold text-gray-800 hover:text-indigo-600 transition-colors duration-200">MyBrand</a>

            <!-- Hamburger icon (visible on small screens, hidden on medium and up) -->
            <button id="hamburgerButton" class="hamburger focus:outline-none md:hidden p-2 rounded-lg hover:bg-gray-100 transition-colors duration-200">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
        </div>

        <!-- Navigation Links (hidden by default on small screens, visible on medium and up) -->
        <!-- On small screens, it slides out from the right (transform-x-full initially) -->
        <div id="navMenu" class="
            absolute top-full right-0 w-64 h-screen bg-white shadow-xl z-10
            transform translate-x-full transition-transform duration-300 ease-in-out
            md:static md:w-auto md:h-auto md:bg-transparent md:shadow-none
            md:flex md:items-center md:space-x-6 md:translate-x-0
            flex flex-col
        ">
            <ul class="flex flex-col md:flex-row md:space-x-6 space-y-4 md:space-y-0 p-4 md:p-0">
                <li><a href="#" class="block text-gray-700 hover:text-indigo-600 font-medium py-2 px-3 rounded-lg transition-colors duration-200 md:py-0 md:px-0">Home</a></li>
                <li><a href="#" class="block text-gray-700 hover:text-indigo-600 font-medium py-2 px-3 rounded-lg transition-colors duration-200 md:py-0 md:px-0">About</a></li>
                <li><a href="#" class="block text-gray-700 hover:text-indigo-600 font-medium py-2 px-3 rounded-lg transition-colors duration-200 md:py-0 md:px-0">Services</a></li>
                <li><a href="#" class="block text-gray-700 hover:text-indigo-600 font-medium py-2 px-3 rounded-lg transition-colors duration-200 md:py-0 md:px-0">Contact</a></li>
            </ul>
            <!-- Example of a call to action button for mobile/desktop -->
            <div class="p-4 md:p-0 md:ml-6">
                <button class="w-full md:w-auto bg-indigo-600 text-white py-2 px-4 rounded-lg shadow-md hover:bg-indigo-700 transition-colors duration-200 font-bold">
                    Sign Up
                </button>
            </div>
        </div>
    </nav>

    <main class="p-8 text-center">
        <h2 class="text-3xl font-semibold text-gray-700 mb-4">Welcome to our Website!</h2>
        <p class="text-gray-600 max-w-2xl mx-auto">This is a demonstration of a responsive hamburger menu built with pure HTML, CSS (Tailwind CSS), and a touch of JavaScript for toggling functionality.</p>
    </main>

    <script>
        const hamburgerButton = document.getElementById('hamburgerButton');
        const navMenu = document.getElementById('navMenu');
        const body = document.body;

        hamburgerButton.addEventListener('click', () => {
            // Toggle the 'active' class on the hamburger button for the 'X' transformation
            hamburgerButton.classList.toggle('active');

            // Toggle the 'translate-x-full' class to show/hide the menu
            navMenu.classList.toggle('translate-x-full');

            // Toggle a class on the body to prevent scrolling when the menu is open
            body.classList.toggle('no-scroll');
        });

        // Close the menu if a link inside it is clicked (useful for single-page applications)
        navMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                // Ensure the menu closes and hamburger icon resets
                hamburgerButton.classList.remove('active');
                navMenu.classList.add('translate-x-full');
                body.classList.remove('no-scroll');
            });
        });

        // Optional: Close the menu if the window is resized to desktop size
        // (e.g., if a user drags browser window from mobile to desktop size)
        window.addEventListener('resize', () => {
            // Check if screen size is 'md' or larger (768px in Tailwind by default)
            if (window.innerWidth >= 768) {
                hamburgerButton.classList.remove('active');
                navMenu.classList.remove('translate-x-full'); // Ensure menu is visible on desktop
                body.classList.remove('no-scroll');
            }
        });
    </script>
</body>
</html>
